<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nouamane Parfums — Fiches Produits</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --sky:  #00AEEF;
    --sky-dark: #0089C0;
    --sky-light: #E0F6FF;
    --sky-pale:  #F0FAFF;
    --white: #ffffff;
    --off:   #f8fbfe;
    --text:  #0d1a2a;
    --text2: #4a6070;
    --text3: #8aa0ae;
    --border:#d0e8f4;
    --gold:  #c8a882;
  }

  body {
    font-family: 'Montserrat', sans-serif;
    background: #e8f4fb;
    padding: 24px;
  }

  /* ─── Page header ─── */
  .page-header {
    text-align: center;
    margin-bottom: 28px;
  }
  .page-header h1 {
    font-size: 1.8rem;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .page-header p { color: var(--text2); font-size:.82rem; margin-top:4px; }

  /* ─── Controls ─── */
  .controls {
    display:flex; flex-wrap:wrap; gap:8px;
    justify-content:center; margin-bottom:22px;
  }
  .controls input, .controls select {
    padding:8px 14px; border:1.5px solid var(--border);
    border-radius:8px; font-family:'Montserrat',sans-serif;
    font-size:.8rem; outline:none; background:#fff;
    transition: border-color .2s;
  }
  .controls input:focus, .controls select:focus { border-color:var(--sky); }
  .controls button {
    padding:8px 18px; background:var(--sky); color:#fff;
    border:none; border-radius:8px;
    font-family:'Montserrat',sans-serif; font-size:.8rem;
    font-weight:700; cursor:pointer; transition:background .2s;
  }
  .controls button:hover { background:var(--sky-dark); }
  .controls button.reset { background:#546e7a; }
  .count-badge {
    text-align:center; font-size:.78rem;
    color:var(--text2); margin-bottom:18px;
  }

  /* ─── Grid ─── */
  .cards-grid {
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(520px, 520px));
    gap:28px;
    justify-content:center;
  }

  /* ─── CARD  520 × 520 ─── */
  .card {
    width:520px; height:520px;
    background:var(--white);
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 6px 28px rgba(0,174,239,.13), 0 2px 8px rgba(0,0,0,.06);
    display:flex; flex-direction:column;
    font-family:'Montserrat',sans-serif;
    position:relative;
  }
  .card.hidden { display:none; }

  /* ─── HEADER ─── */
  .card-header {
    padding:11px 14px 9px;
    background: linear-gradient(135deg, var(--sky-pale) 0%, #e4f5ff 100%);
    border-bottom:1.5px solid var(--border);
    display:flex; justify-content:space-between; align-items:flex-start;
    flex-shrink:0;
  }
  .card-title  { font-size:1.05rem; font-weight:800; color:var(--text); letter-spacing:-.02em; line-height:1.15; }
  .card-brand  { font-size:.6rem; color:var(--sky-dark); font-weight:700; margin-top:2px; text-transform:uppercase; letter-spacing:.07em; }
  .card-gender { font-size:.56rem; color:var(--text2); font-weight:400; font-style:italic; margin-top:1px; }

  /* NAY logo corner */
  .logo-corner img { width:52px; height:52px; object-fit:contain; flex-shrink:0; margin-left:8px; }

  /* ─── BODY ─── */
  .card-body { display:flex; flex:1; overflow:hidden; }

  /* ─── LEFT PANEL ─── */
  .card-left {
    width:185px; flex-shrink:0;
    display:flex; flex-direction:column;
    padding:8px 10px;
    background: linear-gradient(180deg, var(--sky-pale) 0%, #ddf0fb 100%);
    border-right:1.5px solid var(--border);
  }

  /* Product photo */
  .product-photo {
    flex:1; display:flex; align-items:center; justify-content:center;
    margin-bottom:6px; min-height:0;
  }
  .product-photo img {
    max-width:140px; max-height:145px;
    object-fit:contain; border-radius:6px;
    filter: drop-shadow(0 4px 10px rgba(0,174,239,.2));
  }

  /* Rating */
  .rating-block { text-align:center; margin-bottom:6px; }
  .rating-score { font-size:1.1rem; font-weight:800; color:var(--text); }
  .rating-stars { display:flex; justify-content:center; gap:1px; margin:2px 0; }
  .star { font-size:.65rem; }
  .star.full,.star.half { color:#f0a500; }
  .star.empty { color:#d0dde5; }
  .rating-count { font-size:.55rem; color:var(--text3); }

  /* Notes grid */
  .notes-section {
    background:#fff; border-radius:7px;
    padding:5px 7px; border:1.5px solid var(--border);
  }
  .notes-label {
    font-size:.5rem; font-weight:700; color:var(--text2);
    text-transform:uppercase; letter-spacing:.09em; margin-bottom:4px;
  }
  .notes-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:3px; }
  .note-item { display:flex; flex-direction:column; align-items:center; gap:2px; }
  .note-icon-wrap {
    width:30px; height:30px; border-radius:7px;
    display:flex; align-items:center; justify-content:center;
    border:1px solid rgba(0,174,239,.15);
  }
  .note-icon-wrap svg { width:16px; height:16px; }
  .note-name {
    font-size:.44rem; color:var(--text2); text-align:center;
    font-weight:600; line-height:1.2;
    max-width:46px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }

  /* ─── RIGHT PANEL ─── */
  .card-right {
    flex:1; display:flex; flex-direction:column;
    padding:9px 11px; gap:7px; overflow:hidden;
  }

  .section-label {
    font-size:.5rem; font-weight:700; color:var(--text2);
    text-transform:uppercase; letter-spacing:.09em; margin-bottom:4px;
  }

  /* Accords */
  .accords-list { display:flex; flex-direction:column; gap:3px; }
  .accord-bar {
    height:21px; border-radius:5px;
    display:flex; align-items:center; padding:0 10px;
    font-size:.58rem; font-weight:700; letter-spacing:.02em;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }

  /* Profile */
  .profile-box {
    background:var(--sky-pale); border-radius:7px;
    padding:5px 9px; border:1.5px solid var(--border);
  }
  .profile-row { display:flex; gap:14px; margin-top:3px; }
  .profile-item { display:flex; align-items:center; gap:5px; }
  .profile-item svg { width:13px; height:13px; color:var(--sky); flex-shrink:0; }
  .profile-value { font-size:.58rem; font-weight:800; color:var(--text); }
  .profile-key   { font-size:.5rem;  font-weight:400; color:var(--text2); }

  /* Day/Night */
  .daytime-box {
    background:var(--sky-pale); border-radius:7px;
    padding:5px 9px; border:1.5px solid var(--border);
  }
  .daytime-row { display:flex; gap:4px; margin-top:3px; }
  .day-btn {
    flex:1; padding:5px 0; border-radius:5px;
    font-size:.58rem; font-weight:700; text-align:center;
    display:flex; align-items:center; justify-content:center; gap:4px;
  }
  .day-btn svg { width:11px; height:11px; }
  .day-btn.active-day  { background:var(--sky-light); color:var(--sky-dark); }
  .day-btn.active-night{ background:#1a2d3e; color:#a0c8e8; }
  .day-btn.off         { background:#e8edf0; color:#b0c0cc; }

  /* Seasons */
  .seasons-box {
    background:var(--sky-pale); border-radius:7px;
    padding:5px 9px; border:1.5px solid var(--border);
  }
  .seasons-grid { display:grid; grid-template-columns:1fr 1fr; gap:3px; margin-top:3px; }
  .season-btn {
    padding:4px 6px; border-radius:5px;
    font-size:.54rem; font-weight:700; text-align:center;
    display:flex; align-items:center; justify-content:center; gap:3px;
  }
  .season-btn svg { width:10px; height:10px; }
  .season-hiver  { background:#dbeeff; color:#0055a5; }
  .season-printemps { background:#d4f5dc; color:#1a6b30; }
  .season-ete    { background:#fff3c0; color:#7a5000; }
  .season-automne{ background:#ffe8c8; color:#8a3d00; }
  .season-off    { background:#e8edf0; color:#b0c0cc; }

  /* ─── FOOTER ─── */
  .card-footer {
    display:flex; align-items:center; justify-content:space-between;
    padding:7px 13px;
    background: linear-gradient(135deg, var(--sky) 0%, var(--sky-dark) 100%);
    flex-shrink:0;
  }
  .footer-left { display:flex; align-items:center; gap:7px; }
  .footer-logo { width:32px; height:32px; object-fit:contain; filter:brightness(0) invert(1); }
  .footer-brand-name { font-size:.65rem; font-weight:800; color:#fff; letter-spacing:.08em; text-transform:uppercase; }
  .footer-brand-sub  { font-size:.44rem; color:rgba(255,255,255,.75); letter-spacing:.1em; font-weight:400; }
  .footer-conc  { font-size:.55rem; color:rgba(255,255,255,.9); font-weight:700; letter-spacing:.04em; }
  .footer-tag   { font-size:.46rem; color:rgba(255,255,255,.7); font-style:italic; text-align:right; max-width:120px; line-height:1.3; }

  @media print {
    body { background:#fff; padding:0; }
    .controls,.count-badge,.page-header { display:none; }
    .cards-grid { grid-template-columns:repeat(2,520px); gap:8px; }
    .card { break-inside:avoid; box-shadow:none; border:1px solid #ccc; }
  }
</style>
</head>
<body>

<div class="page-header">
  <h1>Nouamane Parfums</h1>
  <p>Collection Complète — Fiches Produits</p>
</div>

<div class="controls">
  <input type="text" id="searchInput" placeholder="🔍 Rechercher un parfum..." oninput="filterCards()">
  <select id="brandFilter" onchange="filterCards()"><option value="">Toutes les marques</option></select>
  <select id="genderFilter" onchange="filterCards()">
    <option value="">Tous genres</option>
    <option value="Masculin">Pour Homme</option>
    <option value="Féminin">Pour Femme</option>
    <option value="Unisexe">Unisexe</option>
  </select>
  <select id="seasonFilter" onchange="filterCards()">
    <option value="">Toutes saisons</option>
    <option value="Hiver">Hiver</option>
    <option value="Printemps">Printemps</option>
    <option value="Été">Été</option>
    <option value="Automne">Automne</option>
  </select>
  <button onclick="window.print()">🖨️ Imprimer</button>
  <button class="reset" onclick="resetFilters()">↺ Réinitialiser</button>
</div>
<p class="count-badge" id="countBadge"></p>

<div class="cards-grid" id="cardsGrid"></div>

  if (n.includes('patchouli')) return '#efebe9';
  if (n.includes('vétiver')) return '#e8f5e9';

  if (n.includes('cuir')) return '#d7ccc8';
  if (n.includes('encens')) return '#f3e5f5';
  if (n.includes('ambre')) return '#fff3e0';
  if (n.includes('vanille')) return '#fff8e1';

function getAccordStyle(family) {
  for (const [k,v] of Object.entries(accordColors)) {
    if (family.includes(k)) return v;
  }
  return accordColors["default"];
}

function getAccords(family) {
  const known = ["Ambré","Boisé","Floral","Fruité","Épicé","Musqué","Oriental","Chypré","Aromatique","Aquatique","Fougère","Poudré","Cuir","Marine","Vanillé","Gourmand","Vert","Hespéridé"];
  const found = [];
  for (const k of known) {
    if (family.includes(k) && !found.includes(k)) found.push(k);
  }
  if (!found.length) found.push(family.split(" ")[0]);
  return found.slice(0,5);
}

function renderStars(r) {
  let h="";
  for(let i=1;i<=5;i++){
    if(r>=i) h+=`<span class="star full">★</span>`;
    else if(r>=i-.5) h+=`<span class="star half">★</span>`;
    else h+=`<span class="star empty">★</span>`;
  }
  return h;
}

function getProfile(c,f) {
  if(c==="Extrait"||c==="Parfum Concentré") return{longevite:"10-12 h",sillage:"Très fort"};
  if(c==="Parfum") return{longevite:"8-10 h",sillage:"Fort"};
  if(c==="EDP Intense") return{longevite:"7-9 h",sillage:"Fort"};
  if(c==="EDP"){
    if(["Oriental","Ambré","Cuir","Boisé Oriental"].some(x=>f.includes(x))) return{longevite:"7-9 h",sillage:"Fort"};
    return{longevite:"6-8 h",sillage:"Modéré-Fort"};
  }
  return{longevite:"4-6 h",sillage:"Modéré"};
}

function genderLabel(g){
  if(g==="Masculin") return "pour homme";
  if(g==="Féminin") return "pour femme";
  return "unisexe";
}

function renderStars(r){let h="";for(let i=1;i<=5;i++){if(r>=i)h+=`<span class="star full">★</span>`;else if(r>=i-.5)h+=`<span class="star half">★</span>`;else h+=`<span class="star empty">★</span>`;}return h;}
function gLabel(g){if(g==="Masculin")return"pour homme";if(g==="Féminin")return"pour femme";return"unisexe";}
function sBtn(name,icon,svgIcon,active){
  if(!active)return`<div class="season-btn season-off">${svgIcon} ${name}</div>`;
  const cls=name==="Hiver"?"season-hiver":name==="Printemps"?"season-printemps":name==="Été"?"season-ete":"season-automne";
  return`<div class="season-btn ${cls}">${svgIcon} ${name}</div>`;
}

function renderCard(p){
  const accords=getAccords(p.family);
  const profile=getProfile(p.concentration,p.family);
  const allNotes=[...(p.notesHead||[]),...(p.notesHeart||[]),...(p.notesBase||[])];
  const notes6=allNotes.slice(0,6);
  const hasW=p.seasons.includes("Hiver");
  const hasSp=p.seasons.includes("Printemps");
  const hasSu=p.seasons.includes("Été")||p.seasons.includes("Ete");
  const hasA=p.seasons.includes("Automne");
  const widths=[100,82,67,55,44];
  const imgPath=getProductImg(p.name);
  const imgTag=imgPath
    ?`<img src="${imgPath}" alt="${p.name}" onerror="this.style.display='none'">`
    :`<div style="width:100px;height:130px;display:flex;align-items:center;justify-content:center;color:#00AEEF;font-size:.6rem;font-weight:600;text-align:center;opacity:.5">${p.name}</div>`;

  return`<div class="card" data-name="${p.name}" data-brand="${p.brand}" data-gender="${p.gender}" data-seasons="${p.seasons.join(',')}">
    <div class="card-header">
      <div>
        <div class="card-title">${p.name}</div>
        <div class="card-brand">${p.brand}</div>
        <div class="card-gender">${gLabel(p.gender)}</div>
      </div>
      <div class="logo-corner"><img src="${LOGO_PATH}" alt="NAY"></div>
    </div>
    <div class="card-body">
      <div class="card-left">
        <div class="product-photo">${imgTag}</div>
        <div class="rating-block">
          <span class="rating-score">${p.rating.toFixed(1)}</span>
          <div class="rating-stars">${renderStars(p.rating)}</div>
          <div class="rating-count">(${p.votes})</div>
        </div>
        <div class="notes-section">
          <div class="notes-label">notes</div>
          <div class="notes-grid">
            ${notes6.map(n=>{
              const bg=getNoteColor(n);
              const ic=getNoteIcon(n);
              const shortN=n.split(" ").slice(0,2).join(" ");
              return`<div class="note-item">
                <div class="note-icon-wrap" style="background:${bg}">${ic}</div>
                <span class="note-name">${shortN}</span>
              </div>`;
            }).join('')}
          </div>
        </div>
      </div>
      <div class="card-right">
        <div>
          <div class="section-label">accords principaux</div>
          <div class="accords-list">
            ${accords.map((a,i)=>{
              const s=getAccordStyle(a);
              const w=widths[i]||40;
              return`<div class="accord-bar" style="background:${s.bg};color:${s.text};width:${w}%">${a}</div>`;
            }).join('')}
          </div>
        </div>
        <div class="profile-box">
          <div class="section-label">profil olfactif</div>
          <div class="profile-row">
            <div class="profile-item">${SVG_CLOCK}<span class="profile-value">${profile.longevite}</span><span class="profile-key">Longévité</span></div>
            <div class="profile-item">${SVG_WAVE}<span class="profile-value">${profile.sillage}</span><span class="profile-key">Sillage</span></div>
          </div>
        </div>
        <div class="daytime-box">
          <div class="section-label">journée</div>
          <div class="daytime-row">
            <div class="day-btn ${p.day?'active-day':'off'}">${SVG_SUN} Jour</div>
            <div class="day-btn ${p.night?'active-night':'off'}">${SVG_MOON} Nuit</div>
          </div>
        </div>
        <div class="seasons-box">
          <div class="section-label">saisons</div>
          <div class="seasons-grid">
            ${sBtn("Hiver","❄️",SVG_SNOW,hasW)}
            ${sBtn("Printemps","🌸",SVG_LEAF,hasSp)}
            ${sBtn("Été","☀️",SVG_BRIGHT,hasSu)}
            ${sBtn("Automne","🍂",SVG_WIND,hasA)}
          </div>
        </div>
      </div>
    </div>
    <div class="card-footer">
      <div class="footer-left">
        <img src="${LOGO_PATH}" class="footer-logo" alt="NAY">
        <div>
          <div class="footer-brand-name">Nouamane Parfums</div>
          <div class="footer-brand-sub">L'Art du Luxe à Votre Portée</div>
        </div>
      </div>
      <div class="footer-conc">${p.concentration} · ${p.size}</div>
      <div class="footer-tag">${p.tagline}</div>
    </div>
  </div>`;
}

function filterCards(){
  const s=document.getElementById('searchInput').value.toLowerCase();
  const b=document.getElementById('brandFilter').value;
  const g=document.getElementById('genderFilter').value;
  const se=document.getElementById('seasonFilter').value;
  let v=0;
  document.querySelectorAll('.card').forEach(c=>{
    let show=true;
    if(s&&!c.dataset.name.toLowerCase().includes(s)&&!c.dataset.brand.toLowerCase().includes(s))show=false;
    if(b&&c.dataset.brand!==b)show=false;
    if(g&&!c.dataset.gender.includes(g))show=false;
    if(se&&!c.dataset.seasons.includes(se))show=false;
    c.classList.toggle('hidden',!show);
    if(show)v++;
  });
  document.getElementById('countBadge').textContent=`${v} parfum${v!==1?'s':''} affiché${v!==1?'s':''}`;
}
function resetFilters(){
  ['searchInput','brandFilter','genderFilter','seasonFilter'].forEach(id=>document.getElementById(id).value="");
  filterCards();
}

function init(){
  const brands=[...new Set(products.map(p=>p.brand))].sort();
  const sel=document.getElementById('brandFilter');
  brands.forEach(b=>{const o=document.createElement('option');o.value=b;o.textContent=b;sel.appendChild(o);});
  document.getElementById('cardsGrid').innerHTML=products.map(p=>renderCard(p)).join('');
  filterCards();
}
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
